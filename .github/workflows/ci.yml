name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./TaskTrackR.Api/TaskTrackR.Api.sln

      - name: Build
        run: dotnet build ./TaskTrackR.Api/TaskTrackR.Api.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ./TaskTrackR.Tests/TaskTrackR.Tests.csproj --no-restore --configuration Release

